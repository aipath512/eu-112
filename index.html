  <style>
    :root {
      --bg: #030305;
      --text: #f7f7fb;
      --muted: #b9bfcb;
      --line: rgba(255,255,255,.12);
      --gold: #e8c96a;
      --gold2: #ffe8a6;
      --red: #ef3340;
      --max: 1180px;
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: -.015em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(var(--max), calc(100% - 48px));
      margin: 0 auto;
    }

    .site-header {
      height: 76px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(3,3,5,.88);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      font-size: 1.55rem;
      font-weight: 950;
      letter-spacing: -.06em;
    }

    .logo span {
      color: var(--red);
    }

    .logo sup {
      font-size: .55rem;
    }

    .navlinks {
      display: flex;
      gap: 21px;
      color: #dfe3eb;
      font-size: .78rem;
      font-weight: 850;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .top-cta {
      border: 1px solid rgba(232,201,106,.5);
      border-radius: 999px;
      padding: 11px 18px;
      font-weight: 900;
      background: rgba(232,201,106,.05);
    }

    .hero {
      position: relative;
      overflow: hidden;
      min-height: 760px;
      padding: 86px 0 44px;
      background:
        linear-gradient(90deg, rgba(3,3,5,1) 0%, rgba(3,3,5,.97) 32%, rgba(3,3,5,.64) 60%, rgba(3,3,5,.08) 100%),
        url("/assets/eu-ai-act-hero-desktop.webp") center right / cover no-repeat;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 78% 30%, rgba(63,160,255,.13), transparent 30%),
        linear-gradient(180deg, transparent 65%, #030305 100%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 730px;
      padding-top: 18px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(232,201,106,.48);
      border-radius: 999px;
      color: #fff;
      font-size: .78rem;
      font-weight: 950;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: rgba(232,201,106,.045);
      margin-bottom: 34px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 18px var(--gold);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.65rem, 7vw, 7.1rem);
      line-height: .88;
      letter-spacing: -.085em;
    }

    h1 .gold {
      display: block;
      color: var(--gold);
    }

    .rule {
      width: 76px;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 30px 0 24px;
    }

    .subtitle {
      font-size: 1.25rem;
      line-height: 1.48;
      color: #f1f3f7;
      max-width: 660px;
      margin: 0;
    }

    .supporting {
      font-size: 1rem;
      line-height: 1.62;
      color: var(--muted);
      max-width: 660px;
      margin: 16px 0 0;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 32px;
    }

    .btn {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      padding: 0 24px;
      border: 1px solid rgba(232,201,106,.42);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .03em;
      background: rgba(255,255,255,.03);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      color: #050505;
      border-color: transparent;
    }

    .grid-2,
    .grid-3 {
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025));
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      padding: 28px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 1.15rem;
      text-transform: uppercase;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
